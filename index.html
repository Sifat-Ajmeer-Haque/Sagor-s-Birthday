<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sagor!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
        }

        /* 1. Logo Section (Intro) */
        #logo-screen {
            text-align: center;
            animation: fadeOut 1.5s forwards 4s;
        }

        .logo {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: #ff4500;
            text-shadow: 0 0 30px #ffea00, 4px 4px 10px #000;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* 2. Main Content (Celebrity Car Photo) */
        #main-content {
            opacity: 0;
            display: none;
            text-align: center;
        }

        .celebrity-photo {
            max-width: 90%;
            max-height: 75vh;
            border: 6px solid #fff;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
            transition: transform 0.5s;
        }

        /* 3. Surprise Button */
        #surprise-btn {
            margin-top: 25px;
            padding: 18px 45px;
            font-size: 1.6rem;
            background: linear-gradient(45deg, #d4145a, #fbb03b);
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(212, 20, 90, 0.5);
            display: none;
            font-weight: bold;
            text-transform: uppercase;
        }

        #surprise-btn:hover {
            transform: scale(1.1) rotate(-2deg);
        }

        /* 4. Video Player Layer */
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 1000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Animations */
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="logo-screen">
        <h1 class="logo">AAGUN-ER TUFAN</h1>
        <p style="font-size: 1.2rem; letter-spacing: 2px;">PRESENTS</p>
        <p style="color: #ffea00; margin-top: 20px;">(Click anywhere to ignite the party! 🔥)</p>
    </div>

    <div id="main-content">
        <img src="your-celebrity-car-photo.jpg.png" alt="Sagor with World Legends" class="celebrity-photo">
        <br>
        <button id="surprise-btn">OPEN BIRTHDAY GIFT 🎁</button>
    </div>

    <div id="video-container">
        <video id="birthday-video" controls>
            <source src="your-video-file.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="bg-music" loop>
        <source src="your-music-file.mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const logoScreen = document.getElementById('logo-screen');
        const mainContent = document.getElementById('main-content');
        const surpriseBtn = document.getElementById('surprise-btn');
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('birthday-video');
        const music = document.getElementById('bg-music');

        // ১. শুরুতে ক্লিক করলে মিউজিক চালু হবে এবং গানটি পুরোটা বাজবে
        document.body.addEventListener('click', () => {
            music.play().catch(e => console.log("Audio play allowed after interaction"));
        }, { once: true });

        // ২. ৫ সেকেন্ড ইনট্রো চলার পর মেইন ফটো আসবে
        setTimeout(() => {
            logoScreen.style.display = 'none';
            mainContent.style.display = 'block';
            mainContent.style.animation = 'fadeIn 2s forwards';
            
            // ৩. ফটো আসার ২ সেকেন্ড পর বাটন আসবে
            setTimeout(() => {
                surpriseBtn.style.display = 'inline-block';
                surpriseBtn.style.animation = 'fadeIn 1s forwards';
            }, 2000);
        }, 5500);

        // ৪. সারপ্রাইজ বাটন ক্লিক করলে গান বন্ধ হয়ে ভিডিও শুরু হবে
        surpriseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            music.pause();
            videoContainer.style.display = 'block';
            video.play();
        });
    </script>
</body>
</html>
