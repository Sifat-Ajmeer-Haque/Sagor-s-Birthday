<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sagor!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
        }

        /* 1. Logo Section */
        #logo-screen {
            text-align: center;
            animation: fadeOut 2s forwards 3s;
        }

        .logo {
            font-size: 5rem;
            font-weight: bold;
            color: #ff4500;
            text-shadow: 0 0 20px #ffea00, 2px 2px 5px #000;
            letter-spacing: 5px;
        }

        /* 2. Main Content (Celebrities & Car) */
        #main-content {
            opacity: 0;
            display: none;
            text-align: center;
        }

        .celebrity-photo {
            max-width: 85%;
            max-height: 70vh;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
        }

        /* 3. Surprise Button */
        #surprise-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #ff0000, #ff8c00);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 69, 0, 0.6);
            display: none;
            font-weight: bold;
        }

        #surprise-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, #ff8c00, #ff0000);
        }

        /* 4. Video Player */
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 100;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Animations */
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="logo-screen">
        <h1 class="logo">AAGUN-ER TUFAN</h1>
        <p>A Sagor Ahmed Production</p>
        <p style="color: #ffea00;">(Click anywhere to start the Funk! 🎶)</p>
    </div>

    <div id="main-content">
        <img src="your-celebrity-car-photo.jpg.png" alt="Sagor with World Leaders" class="celebrity-photo">
        <br>
        <button id="surprise-btn">CLICK FOR A SURPRISE! 🎁</button>
    </div>

    <div id="video-container">
        <video id="birthday-video" controls>
            <source src="your-video-file.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <audio id="bg-music" loop>
        <source src="your-music-file.mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const logoScreen = document.getElementById('logo-screen');
        const mainContent = document.getElementById('main-content');
        const surpriseBtn = document.getElementById('surprise-btn');
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('birthday-video');
        const music = document.getElementById('bg-music');

        // ব্রাউজার অটো-প্লে ব্লক করে, তাই স্ক্রিনে ক্লিক করলে মিউজিক শুরু হবে
        document.body.addEventListener('click', () => {
            music.play().catch(error => console.log("Music waiting for interaction."));
        }, { once: true });

        // ৫ সেকেন্ড পর লোগো থেকে ছবির স্ক্রিনে পরিবর্তন
        setTimeout(() => {
            logoScreen.style.display = 'none';
            mainContent.style.display = 'block';
            mainContent.style.animation = 'fadeIn 2s forwards';
            
            // ছবি আসার ৩ সেকেন্ড পর সারপ্রাইজ বাটন আসবে
            setTimeout(() => {
                surpriseBtn.style.display = 'inline-block';
                surpriseBtn.style.animation = 'fadeIn 1.5s forwards';
            }, 3000);
        }, 5000);

        // সারপ্রাইজ বাটন ক্লিক করলে ভিডিও চলবে
        surpriseBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // মিউজিক আবার ট্রিগার হওয়া রোধ করতে
            music.pause();
            videoContainer.style.display = 'block';
            video.play();
        });
    </script>
</body>
</html>
