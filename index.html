<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagor's Birthday - Aagun Er Tufan</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Arial', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; cursor: pointer;
        }

        /* 1. Intro Logo */
        #logo-screen { 
            text-align: center; 
            animation: fadeOut 1.5s forwards 4s; 
        }
        .logo { 
            font-size: clamp(3rem, 8vw, 5rem); 
            color: #ff4500; 
            text-shadow: 0 0 20px #ffea00; 
            letter-spacing: 5px; 
            font-weight: bold;
        }

        /* 2. Celebrity Photo Section */
        #main-content { 
            opacity: 0; 
            display: none; 
            text-align: center; 
        }
        .celebrity-photo { 
            max-width: 85%; 
            max-height: 70vh;
            border: 5px solid #fff; 
            border-radius: 15px; 
            box-shadow: 0 0 40px rgba(255, 69, 0, 0.5);
        }

        /* 3. Surprise Button */
        #surprise-btn {
            margin-top: 25px; padding: 15px 40px; font-size: 1.5rem;
            background: linear-gradient(45deg, #ff0000, #ff8c00);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            display: none; font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        /* 4. Video Layer */
        #video-container { 
            display: none; position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 100; 
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Animations */
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="logo-screen">
        <h1 class="logo">AAGUN-ER TUFAN</h1>
        <p style="color: #ffea00; margin-top: 10px;">TAP ANYWHERE TO START THE CELEBRATION! 🔥</p>
    </div>

    <div id="main-content">
        <img src="photo.png" class="photo">
        <br>
        <button id="surprise-btn">CLICK FOR THE SURPRISE! 🎁</button>
    </div>

    <div id="video-container">
        <video id="mp4.mp4" controls>
            <source src="mp4.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="bg-music">
        <source src="mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bg-music');
        const video = document.getElementById('birthday-video');
        const mainContent = document.getElementById('main-content');
        const surpriseBtn = document.getElementById('surprise-btn');

        // ১. ক্লিক করলে মিউজিক শুরু হবে
        document.body.addEventListener('click', () => {
            music.play();
        }, { once: true });

        // ২. ৫ সেকেন্ড পর লোগো যাবে এবং সেলিব্রিটি ফটো আসবে
        setTimeout(() => {
            document.getElementById('logo-screen').style.display = 'none';
            mainContent.style.display = 'block';
            mainContent.style.animation = 'fadeIn 2s forwards';
            
            // ৩. ফটো আসার ৩০ সেকেন্ড পর সারপ্রাইজ বাটন আসবে
            setTimeout(() => {
                surpriseBtn.style.display = 'inline-block';
                surpriseBtn.style.animation = 'fadeIn 1s forwards';
            }, 30000); // ৩০ সেকেন্ড (৩০,০০০ মিলিসেকেন্ড)
            
        }, 5500);

        // ৪. সারপ্রাইজ বাটন ক্লিক করলে ভিডিও চালু হবে
        surpriseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            music.pause(); // গান বন্ধ হবে
            document.getElementById('video-container').style.display = 'block';
            video.play(); // ভিডিও শুরু হবে
        });
    </script>
</body>
</html>
