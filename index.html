<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagor's Birthday Tufan</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Arial', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; cursor: pointer;
        }

        #logo-screen { text-align: center; animation: fadeOut 1.5s forwards 4s; }
        .logo { font-size: 4rem; color: #ff4500; text-shadow: 0 0 20px #ffea00; letter-spacing: 5px; }

        #main-content { opacity: 0; display: none; text-align: center; }
        .celebrity-photo { max-width: 80%; border: 5px solid #fff; border-radius: 15px; }

        #surprise-btn {
            margin-top: 20px; padding: 15px 30px; font-size: 1.5rem;
            background: linear-gradient(45deg, #ff0000, #ff8c00);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            display: none; animation: fadeIn 2s forwards;
        }

        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        video { width: 100%; height: 100%; }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="logo-screen">
        <h1 class="logo">AAGUN-ER TUFAN</h1>
        <p>TAP ANYWHERE TO START MUSIC 🎵</p>
    </div>

    <div id="main-content">
        <img src="your-celebrity-car-photo.jpg.png" class="celebrity-photo" onerror="this.src='https://via.placeholder.com/800x400?text=Image+Not+Found+Check+Filename'">
        <br>
        <button id="surprise-btn">CLICK FOR A SURPRISE! 🎁</button>
    </div>

    <div id="video-container">
        <video id="birthday-video" controls>
            <source src="your-video-file.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="bg-music" loop>
        <source src="your-music-file.mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bg-music');
        const video = document.getElementById('birthday-video');

        // অডিও চালু করার জন্য ক্লিক ইভেন্ট
        document.body.addEventListener('click', () => {
            music.play();
        }, { once: true });

        // ট্রানজিশন
        setTimeout(() => {
            document.getElementById('logo-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('main-content').style.animation = 'fadeIn 2s forwards';
            
            setTimeout(() => {
                document.getElementById('surprise-btn').style.display = 'inline-block';
            }, 3000);
        }, 5500);

        // ভিডিওর জন্য বাটন ক্লিক
        document.getElementById('surprise-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            music.pause();
            document.getElementById('video-container').style.display = 'block';
            video.play();
        });
    </script>
</body>
</html>
